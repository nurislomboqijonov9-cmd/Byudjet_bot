<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ijara hisobi</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;450;500;600&family=Archivo:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  :root{--bg:#F3F5F4;--card:#FFFFFF;--ink:#1B2A26;--soft:#63736D;--line:#E7EBE9;
    --brand:#1F4B45;--brand2:#2C6A60;--pos:#2E7D5B;--neg:#C0674F;--faint:#EEF2F0;}
  body.tun{--bg:#0E1518;--card:#16211F;--ink:#E7EFEC;--soft:#8FA39D;--line:#243330;
    --brand:#6FBFA8;--brand2:#8FD3BF;--pos:#4FC08A;--neg:#E08069;--faint:#1B2724;}
  body.tun .hero{background:linear-gradient(135deg,#16302B,#0F2320)!important;}
  body.tun input,body.tun textarea,body.tun select{background:#101A18;color:var(--ink);border-color:var(--line);}
  body.tun input::placeholder,body.tun textarea::placeholder{color:#6E837D;}
  body.tun .mini-btn,body.tun .li-btn,body.tun .mic,body.tun .qbtn{background:#101A18;color:var(--brand2);border-color:var(--line);}
  body.tun .send{background:var(--brand);color:#08110F;}
  body.tun .del{background:#2A1815;color:#E08069;border-color:#40241F;}
  body.tun .av{background:#1C2A27;color:var(--brand2);}
  body.tun .smsbtn{background:#101A18;color:var(--brand2);}
  body.tun #toast{background:#E7EFEC;color:#0E1518;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;max-width:520px;margin:0 auto;transition:max-width .18s;
    padding:0 14px 40px;line-height:1.4;-webkit-font-smoothing:antialiased;}
  .num{font-family:'Space Grotesk',sans-serif;font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
  header{padding:20px 4px 12px;display:flex;align-items:flex-end;}
  .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--brand2);font-weight:600;}
  h1{font-family:'Space Grotesk';font-size:22px;font-weight:700;margin-top:3px;}
  .plus{margin-left:auto;background:var(--brand);color:#fff;border:none;border-radius:11px;padding:9px 13px;
    font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;}
  .hero{background:var(--brand);color:#fff;border-radius:18px;padding:18px 20px;margin-bottom:16px;position:relative;overflow:hidden;}
  .hero .arc{position:absolute;right:-40px;top:-40px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.05);}
  .hero .lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.55);font-weight:600;}
  .hero .amt{font-size:30px;font-weight:700;margin-top:6px;} .hero .amt small{font-size:15px;color:rgba(255,255,255,.65);}
  .hero .sub{font-size:12.5px;color:rgba(255,255,255,.6);margin-top:4px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:15px;margin-bottom:10px;}
  .mijoz{display:flex;align-items:center;gap:13px;cursor:pointer;}
  .av{width:44px;height:44px;border-radius:12px;background:var(--faint);color:var(--brand);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-weight:700;font-size:17px;}
  .mijoz .nm{font-size:15.5px;font-weight:600;} .mijoz .mt{font-size:12.5px;color:var(--soft);margin-top:2px;}
  .mijoz .val{margin-left:auto;text-align:right;flex-shrink:0;white-space:nowrap;padding-left:10px;} .mijoz .val b{font-family:'Space Grotesk';font-weight:700;font-size:15.5px;white-space:nowrap;}
  .mijoz .val span{display:block;font-size:11px;color:var(--soft);} .chev{color:#B7C3BD;font-size:20px;margin-left:6px;}
  .back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--brand2);
    font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;padding:6px 0;margin-bottom:4px;}
  .p-head{display:flex;align-items:center;margin-bottom:10px;}
  .p-badge{background:var(--brand);color:#fff;font-family:'Space Grotesk';font-weight:700;font-size:13px;
    width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-right:10px;flex-shrink:0;}
  .p-title{font-size:15px;font-weight:600;} .p-sana{font-size:12px;color:var(--soft);}
  .p-grid{display:flex;gap:8px;margin-top:10px;}
  .box{flex:1;background:var(--faint);border-radius:10px;padding:9px 10px;}
  .box .k{font-size:10.5px;color:var(--soft);text-transform:uppercase;} .box .v{font-family:'Space Grotesk';font-weight:600;font-size:15px;margin-top:2px;}
  .p-narx{display:flex;justify-content:space-between;align-items:center;margin-top:11px;padding-top:11px;border-top:1px solid var(--faint);}
  .p-narx .k{font-size:13px;color:var(--soft);} .p-narx b{font-family:'Space Grotesk';font-weight:700;font-size:16px;}
  .done{color:var(--pos);font-weight:600;font-size:12.5px;}
  .addbox{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px;margin-bottom:10px;}
  .addbox .t{font-family:'Space Grotesk';font-weight:600;font-size:14px;margin-bottom:10px;}
  .inrow{display:flex;gap:8px;}
  input.f{flex:1;width:100%;padding:12px;border:1px solid var(--line);border-radius:11px;font-size:15px;font-family:inherit;color:var(--ink);outline:none;background:#fff;}
  input.f:focus{border-color:var(--brand);}
  .mic{width:46px;flex-shrink:0;border:1px solid var(--line);background:#fff;border-radius:11px;font-size:19px;cursor:pointer;}
  .mic.rec{background:var(--neg);border-color:var(--neg);color:#fff;animation:pulse 1s infinite;}
  @keyframes pulse{50%{opacity:.55;}}
  .send{width:100%;margin-top:8px;padding:12px;background:var(--brand);color:#fff;border:none;border-radius:11px;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;}
  .del{width:100%;margin-top:8px;padding:13px;border:1px solid var(--neg);color:var(--neg);background:#fff;border-radius:12px;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;}
  .hint{font-size:12px;color:var(--soft);margin-top:8px;}
  .center{min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--soft);font-size:14px;padding:20px;}
  .spin{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--brand);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 12px;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .empty{text-align:center;color:var(--soft);font-size:14px;padding:40px 20px;}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:11px 16px;border-radius:12px;font-size:13.5px;max-width:90%;text-align:center;z-index:50;box-shadow:0 6px 20px rgba(0,0,0,.2);}
  .form input{margin-top:8px;}
  .search{margin-bottom:12px;}
  .search input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;font-size:15px;font-family:inherit;background:#fff;outline:none;}
  .search input:focus{border-color:var(--brand);}
  .brk{display:flex;justify-content:space-between;font-size:14px;padding:8px 0;}
  .brk:not(:last-child){border-bottom:1px solid var(--faint);}
  .brk .k{color:var(--soft);} .brk b{font-family:'Space Grotesk';}
  .tlist{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--faint);font-size:13.5px;}
  .tlist:last-child{border-bottom:none;}
  .tlist .s{font-family:'Space Grotesk';font-weight:600;color:var(--pos);}
  .tlist .x{margin-left:auto;color:#B7C3BD;background:none;border:none;font-size:18px;cursor:pointer;}
  .mini-btn{flex:1;padding:9px;border:1px solid var(--line);background:#fff;border-radius:10px;font-family:inherit;font-weight:600;font-size:13px;color:var(--brand);cursor:pointer;}
  .rlist{display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px solid var(--faint);font-size:13px;color:var(--soft);}
  .rlist .x{margin-left:auto;color:#B7C3BD;background:none;border:none;font-size:17px;cursor:pointer;}
  .statrow{display:flex;align-items:center;gap:10px;padding:12px 15px;}
  .stbadge{font-weight:600;font-size:13.5px;padding:5px 12px;border-radius:20px;}
  .edit-status{margin-left:auto;background:none;border:1px solid var(--line);border-radius:9px;padding:7px 11px;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--soft);cursor:pointer;}
  .stdot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px;vertical-align:middle;}
  .litems{margin-top:2px;}
  .litem{padding:11px 0;border-top:1px solid var(--faint);}
  .litem:first-child{border-top:none;padding-top:4px;}
  .li-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
  .li-nm{font-size:14.5px;font-weight:600;}
  .li-val{font-family:'Space Grotesk';font-size:12.5px;color:var(--soft);white-space:nowrap;}
  .li-sub{display:flex;justify-content:space-between;align-items:center;margin-top:4px;font-size:12px;color:var(--soft);}
  .li-acts{display:flex;gap:6px;}
  .li-manzil{font-size:12px;color:var(--brand);margin-top:3px;}
  .li-brov{font-size:12px;color:#B26A31;margin-top:3px;}
  .ta{flex:1 1 auto;width:100%;min-width:0;box-sizing:border-box;resize:none;overflow:hidden;height:46px;min-height:46px;line-height:1.45;font-family:inherit;padding:12px 14px;}
  .mic-sm{height:46px;}
  .thint{font-size:12px;color:var(--brand2);margin:0 0 8px 2px;min-height:15px;}
  .tabb{flex:1;padding:10px;border-radius:11px;border:1px solid var(--line);background:#fff;color:var(--soft);
    font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;}
  .tabb.on{background:var(--brand);color:#fff;border-color:var(--brand);}
  body.tun .tabb{background:#101A18;}
  body.tun .tabb.on{background:var(--brand);color:#08110F;}
  .login{max-width:340px;margin:0 auto;padding:36px 0;}
  .loginlogo{display:block;width:132px;height:132px;margin:0 auto;border-radius:26px;box-shadow:0 10px 30px -12px rgba(10,23,41,.45);}
  .login .sub{text-align:center;color:var(--soft);font-size:13px;margin-bottom:22px;}
  .login input{margin-bottom:10px;}
  #xarita{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;flex-direction:column;}
  #xarita.on{display:flex;}
  #xmap{flex:1;width:100%;}
  .xbar{padding:12px 14px;background:var(--brand);color:#fff;display:flex;align-items:center;gap:10px;}
  .xbar b{font-family:'Archivo',sans-serif;font-size:15px;}
  .xbar button{margin-left:auto;background:rgba(255,255,255,.16);color:#fff;border:none;
    border-radius:10px;padding:8px 14px;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;}
  .xpin{position:absolute;left:50%;top:50%;transform:translate(-50%,-100%);z-index:500;font-size:34px;
    pointer-events:none;filter:drop-shadow(0 3px 6px rgba(0,0,0,.35));}
  .xpast{padding:12px 14px;background:var(--card);border-top:1px solid var(--line);}
  .xpast .koor{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--soft);text-align:center;margin-bottom:8px;}
  .qrow{border:1px solid var(--line);border-radius:12px;padding:10px;margin-top:8px;background:var(--faint);}
  .pickwrap{position:relative;}
  .pickb{position:absolute;right:6px;top:6px;border:none;background:none;font-size:16px;color:var(--soft);cursor:pointer;padding:4px 8px;}
  .picklist{display:none;position:absolute;left:0;right:0;top:100%;z-index:70;background:var(--card);
    border:1px solid var(--line);border-radius:12px;max-height:190px;overflow:auto;
    box-shadow:0 10px 28px rgba(0,0,0,.22);margin-top:4px;}
  .picklist div{padding:11px 13px;font-size:14.5px;cursor:pointer;border-bottom:1px solid var(--faint);}
  .unitb{min-width:56px;border:1px solid var(--brand);background:#fff;color:var(--brand);border-radius:11px;
    font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;flex-shrink:0;}
  body.tun .unitb{background:#101A18;}
  .delrow{min-width:44px;border:1px solid var(--line);background:#fff;border-radius:11px;font-size:15px;cursor:pointer;flex-shrink:0;}
  body.tun .delrow{background:#101A18;}
  .card.perech{background:#F6F2FC;border-left:4px solid #7A4FC0;}
  body.tun .card.perech{background:#1B1826;border-left-color:#8F6FD8;}
  .errbox{background:#FBEAE4;border:1px solid #E3B4A4;color:#8E3B22;border-radius:11px;padding:11px 13px;
    font-size:13.5px;line-height:1.45;margin-top:8px;position:relative;}
  .errbox button{position:absolute;top:6px;right:8px;background:none;border:none;color:#8E3B22;font-size:18px;cursor:pointer;}
  body.tun .errbox{background:#2A1815;border-color:#5A3228;color:#F0A88E;}
  .thint b{cursor:pointer;text-decoration:underline;}
  body.wide{max-width:1100px;}
  body.wide .card,body.wide .addbox{padding-left:20px;padding-right:20px;}
  .fsbtn{display:none;background:#12202B;color:#fff;border:none;border-radius:11px;padding:9px 12px;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;margin-left:6px;}
  body.desk .fsbtn{display:inline-block;}
  #clockbar{position:sticky;top:0;z-index:60;margin:0 -14px 6px;padding:9px 14px;background:var(--brand);
    color:#fff;text-align:center;font-family:'Space Grotesk';font-size:15px;font-weight:600;letter-spacing:.03em;
    box-shadow:0 2px 10px rgba(0,0,0,.10);}
  body.tun #clockbar{background:#16302B;color:#BFE6D8;}
  .tunbtn{background:#12202B;color:#fff;border:none;border-radius:11px;padding:9px 12px;font-size:14px;cursor:pointer;margin-left:6px;}
  body.tun .tunbtn,body.tun .ombnav,body.tun .fsbtn{background:#1C2A27;color:var(--ink);}
  .qbtn{float:right;border:1px solid var(--line);background:#fff;color:var(--brand);border-radius:8px;padding:4px 10px;font-size:12px;font-family:inherit;cursor:pointer;font-weight:600;}
  .ta.qsmall{height:92px!important;min-height:92px!important;overflow:auto!important;}
  .thint.ok{color:var(--pos);}
  .mzg{padding:9px 0;border-top:1px solid var(--faint);}
  .mzg:first-child{border-top:none;padding-top:2px;}
  .mzg-h{font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:5px;}
  .mzg-i{display:flex;align-items:center;justify-content:space-between;font-size:13px;padding:2px 0;color:var(--soft);}
  .mzg-i b{font-family:'Space Grotesk';color:var(--ink);}
  .li-btn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 11px;font-size:13px;cursor:pointer;color:var(--brand);font-family:inherit;}
  .retg{padding:9px 0;border-top:1px solid var(--faint);}
  .retg:first-child{border-top:none;padding-top:2px;}
  .retg-d{font-size:12px;color:var(--brand2);font-weight:600;margin-bottom:5px;}
  .retg-i{display:flex;align-items:center;justify-content:space-between;font-size:13.5px;padding:3px 0;}
  .retg-i b{font-family:'Space Grotesk';}
  .retg-i .x{color:#B7C3BD;background:none;border:none;font-size:17px;cursor:pointer;}
  .smsbtn{width:100%;padding:12px;background:#fff;border:1px solid var(--brand);color:var(--brand);border-radius:12px;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;margin-bottom:10px;}
  .omb-wrap{background:#0B1017;margin:0 -14px;padding:14px;min-height:100vh;}
  .omb-h{padding:4px 2px 12px;}
  .omb-h .t{font-family:'Space Grotesk';font-size:21px;font-weight:700;color:#fff;}
  .omb-h .s{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#5B6B7A;margin-top:2px;}
  .omb-stats{display:flex;gap:8px;margin-bottom:12px;}
  .omb-stat{flex:1;background:#131C26;border-radius:12px;padding:12px;}
  .omb-stat .v{font-family:'Space Grotesk';font-weight:700;font-size:19px;color:#fff;}
  .omb-stat .k{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#5B6B7A;margin-top:3px;}
  .omb-search input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #1E2A36;background:#131C26;color:#fff;font-size:15px;font-family:inherit;outline:none;margin-bottom:12px;}
  .omb-card{background:#131C26;border-radius:14px;margin-bottom:10px;overflow:hidden;}
  .omb-top{display:flex;align-items:center;padding:12px 14px;}
  .omb-nm{color:#fff;font-weight:600;font-size:15px;}
  .omb-jami{margin-left:auto;color:#5B6B7A;font-size:12.5px;font-family:'Space Grotesk';}
  .omb-edit{background:none;border:none;color:#5B6B7A;font-size:15px;margin-left:12px;cursor:pointer;}
  .omb-grid{display:flex;border-top:1px solid #1E2A36;}
  .omb-col{flex:1;text-align:center;padding:12px;}
  .omb-col:first-child{border-right:1px solid #1E2A36;}
  .omb-col .v{font-family:'Space Grotesk';font-weight:700;font-size:24px;}
  .omb-col .k{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#5B6B7A;margin-top:3px;}
  .omb-a{color:#E8B44A;} .omb-o{color:#3FBF87;} .omb-z{color:#E0574A;}
  .omb-acts{padding:11px 14px;border-top:1px solid #1E2A36;}
  .omb-btn{width:100%;padding:11px;border-radius:10px;border:1px solid #2A3B4A;background:#1A2632;color:#CFE3EE;font-family:inherit;font-weight:600;font-size:13.5px;cursor:pointer;margin-bottom:7px;}
  .omb-in{width:100%;padding:11px;border-radius:10px;border:1px solid #2A3B4A;background:#0E151D;color:#fff;font-size:15px;font-family:inherit;outline:none;margin-bottom:7px;}
  .omb-tabs{display:flex;gap:8px;margin-bottom:12px;}
  .omb-tab{flex:1;padding:11px;border-radius:11px;border:none;background:#131C26;color:#8A9AA8;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;}
  .omb-tab.on{background:#F3F5F4;color:#0B1017;}
  .ombnav{margin-left:auto;background:#12202B;color:#fff;border:none;border-radius:11px;padding:9px 13px;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;}

  /* ============ ILOVA REJIMI (Telegramdan tashqarida) ============ */
  body.app{--brand:#16336B;--brand2:#2E5AA8;--bg:#F6F7F9;--card:#FFFFFF;--ink:#0A1729;
    --soft:#6B7A90;--line:#E4E9F0;--faint:#EDF1F6;--pos:#1E7A5A;--neg:#C4553C;--latun:#C08A2E;
    background:var(--bg);}
  body.app.tun{--brand:#7FA5E8;--brand2:#9BBBF0;--bg:#08111F;--card:#101E33;--ink:#E9EFF7;
    --soft:#7E90A8;--line:#1B2C46;--faint:#16253D;--latun:#D9A94E;}

  /* --- yuqori panel: logo + soat --- */
  body.app #clockbar{background:linear-gradient(180deg,#16336B,#122A57);padding:11px 16px 12px;
    display:flex;align-items:center;gap:10px;text-align:left;font-size:0;box-shadow:0 2px 14px rgba(10,23,41,.18);}
  body.app.tun #clockbar{background:linear-gradient(180deg,#0D2148,#0A1A37);}
  body.app #clockbar::before{content:'';width:118px;height:30px;flex-shrink:0;margin-right:auto;
    background:url('/logo.png') left center/contain no-repeat;}
  body.app #clock{font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:400;
    color:rgba(255,255,255,.72);letter-spacing:.03em;}

  /* --- sarlavha --- */
  body.app header{padding:16px 2px 10px;}
  body.app .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--soft);font-weight:400;}
  body.app h1{font-family:'Archivo',sans-serif;font-weight:800;font-size:25px;letter-spacing:-.025em;}
  body.app .ombnav,body.app .tunbtn,body.app .fsbtn{background:var(--faint);color:var(--brand);
    border:1px solid var(--line);font-weight:600;}
  body.app.tun .ombnav,body.app.tun .tunbtn,body.app.tun .fsbtn{background:var(--faint);color:var(--brand2);}
  body.app .plus{background:linear-gradient(135deg,#16336B,#0F2650);box-shadow:0 8px 18px -10px rgba(22,51,107,.8);}

  /* --- hero: qarz kartasi --- */
  body.app .hero{background:linear-gradient(145deg,#16336B 0%,#0E2350 60%,#0A1B3E 100%);
    border-radius:22px;padding:22px 20px 20px;box-shadow:0 18px 34px -18px rgba(22,51,107,.55);}
  body.app.tun .hero{background:linear-gradient(145deg,#12294F,#0A1B3A)!important;}

<script>
  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg){ try{ tg.ready(); tg.expand(); tg.setHeaderColor('#1F4B45'); tg.setBackgroundColor('#F3F5F4'); }catch(e){} }
  function tokenGet(){ try{ return localStorage.getItem('tok')||''; }catch(e){ return ''; } }
  const H = { 'X-Init-Data': (tg && tg.initData) || '', 'X-Token': tokenGet() };
  function tokenSet(t){ try{ localStorage.setItem('tok',t||''); }catch(e){} H['X-Token']=t||''; }
  // Keng rejim (noutbuk / kompyuterda katta ekran)
  if(!(tg && tg.initData)) document.body.classList.add('app');   // ilova rejimi (Telegramdan tashqarida)
  const PLAT = ((tg && tg.platform) || '').toLowerCase();
  const MOBIL = /android|ios/.test(PLAT);
  if(!MOBIL) document.body.classList.add('desk');
  try{ if(localStorage.getItem('wide')==='1') document.body.classList.add('wide'); }catch(e){}
  // Tungi rejim
  try{ if(localStorage.getItem('tun')==='1') document.body.classList.add('tun'); }catch(e){}
  function tunSync(){
    const on=document.body.classList.contains('tun');
    const b=document.getElementById('tunb'); if(b) b.textContent=on?'☀️':'🌙';
    try{ tg&&tg.setHeaderColor&&tg.setHeaderColor(on?'#0E1518':'#1F4B45');
         tg&&tg.setBackgroundColor&&tg.setBackgroundColor(on?'#0E1518':'#F3F5F4'); }catch(e){}
  }
  // Jonli O'zbekiston (Toshkent) vaqti
  function tkNow(){
    try{
      const f=new Intl.DateTimeFormat('en-GB',{timeZone:'Asia/Tashkent',day:'2-digit',month:'2-digit',year:'2-digit',
        hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
      const p={}; for(const x of f.formatToParts(new Date())) p[x.type]=x.value;
      return `${p.day}.${p.month}.${p.year} · ${p.hour}:${p.minute}:${p.second}`;
    }catch(e){
      const d=new Date(Date.now()+(5*60+new Date().getTimezoneOffset())*60000);
      const z=n=>String(n).padStart(2,'0');
      return `${z(d.getDate())}.${z(d.getMonth()+1)}.${String(d.getFullYear()).slice(2)} · ${z(d.getHours())}:${z(d.getMinutes())}:${z(d.getSeconds())}`;
    }
  }
  function tickClock(){ const el=document.getElementById('clock');
    if(el) el.textContent = (document.body.classList.contains('app') ? ('v'+window.APPV+' · ') : '🇺🇿 ') + tkNow(); }
  setInterval(tickClock,1000);

  window.tunTgl=function(){
    const on=!document.body.classList.contains('tun');
    document.body.classList.toggle('tun',on);
    try{ localStorage.setItem('tun',on?'1':'0'); }catch(e){}
    tunSync();
  };
  tunSync();
  window.wideTgl=function(){
    const on=!document.body.classList.contains('wide');
    document.body.classList.toggle('wide',on);
    try{ localStorage.setItem('wide',on?'1':'0'); }catch(e){}
    try{
      if(on){
        if(tg&&tg.requestFullscreen) tg.requestFullscreen();
        else if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        tg&&tg.expand&&tg.expand();
      }else{
        if(tg&&tg.exitFullscreen) tg.exitFullscreen();
        else if(document.exitFullscreen && document.fullscreenElement) document.exitFullscreen();
      }
    }catch(e){}
    const b=document.getElementById('fsb'); if(b) b.textContent=on?'⤡':'⛶';
  };
  const app = document.getElementById('app');
  let rec=null, recChunks=[], recMid=null;

  const som=n=>{n=Math.round(Number(n)||0);return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ');};
  const son=n=>{n=Number(n)||0;return Number.isInteger(n)?n:parseFloat(n.toFixed(2)).toString();};
  const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const ini=s=>(s||'?').trim().charAt(0).toUpperCase();
  const dmy=s=>{if(!s)return'';const p=(''+s).slice(0,10).split('-');return p.length===3?p[2]+'.'+p[1]+'.'+p[0].slice(2):s;};
  const TUR={naqd:{t:'Naqd',c:'#2E7D5B',bg:'rgba(46,125,91,.13)',i:'💵'},perech:{t:'Perechisleniye',c:'#7A4FC0',bg:'rgba(122,79,192,.14)',i:'🏦'}};
  const STAT={faol:{t:'Faol',c:'#2E7D5B',bg:'rgba(46,125,91,.13)'},nofaol:{t:'Nofaol',c:'#C0674F',bg:'rgba(192,103,79,.13)'},sotuv:{t:'Sotuv',c:'#2D6CB2',bg:'rgba(45,108,178,.13)'}};
  const phones=s=>(s||'').split(',').map(x=>x.trim()).filter(Boolean).join(' · ');
  function toast(m){const t=document.getElementById('toast');t.innerHTML='<div class="toast">'+esc(m)+'</div>';setTimeout(()=>t.innerHTML='',3500);}
  function xatoBox(where,msg){
    const el=document.getElementById(where); if(!el){toast(msg);return;}
    el.innerHTML='<div class="errbox">❌ '+esc(msg)+'<button onclick="this.parentNode.parentNode.innerHTML=\'\'">×</button></div>';
    el.scrollIntoView({behavior:'smooth',block:'center'});
  }
  function xatoTozala(where){const el=document.getElementById(where); if(el) el.innerHTML='';}
  function authXato(r){ if(r&&r.status===401&&!(tg&&tg.initData)){ tokenSet(''); loginEkran('Qaytadan kiring'); return true; } return false; }
  function errScreen(){app.innerHTML='<div class="center"><div>Ma\'lumot yuklanmadi.<br><br>Botdagi <b>«📊 Hisob»</b> tugmasi orqali oching.</div></div>';}

  window.BOLIM='ijara';
  try{ const b=localStorage.getItem('bolim'); if(b==='sotuv'||b==='ijara') window.BOLIM=b; }catch(e){}
  window.bolimTgl=function(b){
    window.BOLIM=b;
    try{ localStorage.setItem('bolim',b); }catch(e){}
    loadList();
  };
  async function loadList(){
    window._lastMijoz=null;
    app.innerHTML='<div class="center"><div><div class="spin"></div>Yuklanmoqda…</div></div>';
    let d; try{const r=await fetch('/api/mijozlar?bolim='+(window.BOLIM||'ijara'),{headers:H});if(authXato(r))return;if(!r.ok)throw 0;d=await r.json();}catch(e){return errScreen();}
    window._ml=d.mijozlar||[]; const jami=_ml.reduce((s,m)=>s+m.qolgan_qarz,0);
    setTimeout(()=>{const b=document.getElementById('fsb');if(b)b.textContent=document.body.classList.contains('wide')?'⤡':'⛶';tunSync();tickClock();},0);
    app.innerHTML=`<header><div><div class="eyebrow">${BOLIM==='sotuv'?'Sotuv hisobi':'Ijara hisobi'}</div><h1>Mijozlar</h1></div>
        <button class="ombnav" onclick="loadOmbor()">📦 Ombor</button>
        <button class="fsbtn" id="fsb" onclick="wideTgl()">⛶</button>
        <button class="tunbtn" id="tunb" onclick="tunTgl()">🌙</button>
        ${(tg&&tg.initData)?'':'<button class="tunbtn" onclick="chiqish()">🚪</button>'}
        <button class="plus" style="margin-left:8px" onclick="showNew()">➕</button></header>
      <div class="inrow" style="margin:0 0 12px">
        <button class="tabb ${BOLIM==='ijara'?'on':''}" onclick="bolimTgl('ijara')">🏗 Ijara</button>
        <button class="tabb ${BOLIM==='sotuv'?'on':''}" onclick="bolimTgl('sotuv')">🏷 Sotuv</button></div>
      <div class="hero"><div class="arc"></div><div class="lbl">Umumiy qarz</div>
        <div class="amt num">${som(jami)} <small>so'm</small></div><div class="sub">${_ml.length} ta mijoz</div></div>
      <div id="newform"></div>
      <div class="search"><input id="qidir" placeholder="🔍 Ism, telefon yoki manzil..." oninput="renderCards(this.value)"></div>
      <div id="cards"></div>`;
    renderCards('');
  }

  window.renderCards=function(q){
    q=(q||'').toLowerCase().trim();
    const list=(window._ml||[]).filter(m=>!q || (m.mijoz||'').toLowerCase().includes(q) || (m.telefon||'').includes(q) || (m.adres||'').toLowerCase().includes(q));
    let cards=list.map(m=>`<div class="card mcard st-${esc(m.status||'')}${m.tolov_turi==='perech'?' perech':''}"><div class="mijoz" onclick="loadMijoz(${m.id})">
        <div class="av"><span>${ini(m.mijoz)}</span></div>
        <div><div class="nm">${m.status&&STAT[m.status]?`<span class="stdot" style="background:${STAT[m.status].c}"></span>`:''}${esc(m.mijoz)}</div>
          <div class="mt">${m.telefon?('📞 '+esc(phones(m.telefon))+' · '):''}${son(m.jami_qolgan)} dona qolgan${m.tolov_turi==='perech'?' · <b style="color:#7A4FC0">🏦 perech</b>':(m.tolov_turi==='naqd'?' · 💵':'')}</div>
          ${m.adres?`<div class="mt" style="color:var(--brand)">📍 ${esc(m.adres)}</div>`:''}</div>
        <div class="val"><b>${som(m.qolgan_qarz)}</b><span>so'm</span></div><div class="chev">›</div></div></div>`).join('');
    if(!list.length) cards='<div class="empty">'+(q?'Topilmadi':'Hozircha mijoz yo\'q. «➕ Yangi» bosing.')+'</div>';
    document.getElementById('cards').innerHTML=cards;
  };

  window.showNew=function(){
    const f=document.getElementById('newform');
    if(f.innerHTML){f.innerHTML='';return;}
    f.innerHTML=`<div class="addbox form"><div class="t">➕ Yangi mijoz</div>
      <input class="f" id="n_ism" placeholder="Ism (masalan Abbos)">
      <input class="f" id="n_tel" placeholder="Telefon (bir nechta bo'lsa probel yoki vergul bilan)" inputmode="tel">
      <button class="send" onclick="saveNew()">Saqlash</button></div>`;
  };
  window.saveNew=async function(){
    const ism=document.getElementById('n_ism').value.trim();
    const tel=document.getElementById('n_tel').value.trim();
    if(!ism){toast('Ism kiriting');return;}
    try{const r=await fetch('/api/mijoz_qosh',{method:'POST',headers:{...H,'Content-Type':'application/json'},body:JSON.stringify({ism,telefon:tel,bolim:(window.BOLIM||'ijara')})});
      const d=await r.json(); if(d.ok){toast('Mijoz qo\'shildi');loadMijoz(d.id);} else toast(d.xato||'Xato');}catch(e){toast('Xato');}
  };

  window.loadMijoz=async function(id){
    const _y=(window._lastMijoz===id)?window.scrollY:0; window._lastMijoz=id;
    app.innerHTML='<div class="center"><div><div class="spin"></div>Yuklanmoqda…</div></div>';
    let d; try{const r=await fetch('/api/mijoz?id='+id,{headers:H});if(!r.ok)throw 0;d=await r.json();}catch(e){return errScreen();}
    const bugun=new Date().toLocaleDateString('en-CA');
    window._curMijoz=d;
    // Bitta mahsulot satri (yetkazma ichida)
    const itemHtml=p=>{const done=p.qolgan<=0;
      return `<div class="litem pcard" data-nom="${esc((p.mahsulot||'').toLowerCase())}">
        <div class="li-top"><span class="li-nm">${esc(p.mahsulot)}${done?' <span class="done">✓</span>':''}</span>
          <span class="li-val" style="${p.qolgan<0?'color:var(--neg)':''}">${son(p.qolgan)}/${son(p.miqdor)} ${esc(p.birlik||'ta')} · ${som(p.kunlik_narx)}/kun</span></div>
        ${p.manzil?`<div class="li-manzil">📍 ${esc(p.manzil)}</div>`:''}
        ${p.brov_kim?`<div class="li-brov">🔁 Brovdan: ${esc(p.brov_kim)}${p.brov_miqdor&&p.brov_miqdor<p.miqdor?' — '+son(p.brov_miqdor)+' ta':''}</div>`:''}
        <div class="li-sub"><span>🧮 ${som(p.narx)} so'm · ${p.kunlar} kun</span>
          <span class="li-acts"><button class="li-btn" onclick="tgl('edit${p.id}')">✏️</button>
            ${p.qolgan>0?`<button class="li-btn" onclick="tgl('ret${p.id}')">↩️</button>`:''}</span></div>
        <div id="edit${p.id}" style="display:none;margin-top:8px">
          <input class="f" id="e_mah${p.id}" value="${esc(p.mahsulot)}" placeholder="Mahsulot" list="tovarlist" oninput="tovarHint(this)" onblur="tovarFix(this)" autocomplete="off" style="margin-bottom:4px">
          <div class="thint" id="th${p.id}"></div>
          <div class="inrow"><input class="f" id="e_miq${p.id}" value="${son(p.miqdor)}" inputmode="decimal" placeholder="Soni">
            <input class="f" id="e_narx${p.id}" value="${son(p.kunlik_narx)}" inputmode="numeric" placeholder="Kunlik narx"></div>
          <input class="f" id="e_manzil${p.id}" value="${esc(p.manzil||'')}" placeholder="📍 Manzil / ob'ekt" style="margin-top:8px">
          <input class="f" id="e_bkim${p.id}" value="${esc(p.brov_kim||'')}" placeholder="🔁 Brovdan: kimdan (bo'sh qoldiring — o'zimizniki)" style="margin-top:8px">
          <input class="f" id="e_sana${p.id}" type="date" value="${p.chiqgan_sana}" style="margin-top:8px">
          <button class="send" onclick="savePartiya(${p.id},${d.id})">Saqlash</button>
          <button class="del" style="margin-top:8px" onclick="delPartiya(${p.id},${d.id})">🗑 Bu mahsulotni o'chirish</button></div>
        <div id="ret${p.id}" style="display:none;margin-top:8px">
          <div class="inrow"><input class="f" id="r_miq${p.id}" inputmode="decimal" placeholder="Nechta qaytdi">
            <input class="f" id="r_sana${p.id}" type="date" value="${bugun}"></div>
          <button class="send" onclick="saveRet(${p.id},${d.id})">Qaytdi</button></div>
      </div>`;};
    // Yetkazmalar (nakladnoy): bir kun = bir karta
    const ps=(d.yetkazmalar||[]).map(y=>`<div class="card"><div class="p-head"><div class="p-badge">📦</div>
        <div><div class="p-title">Yetkazma · ${y.items.length} mahsulot</div>
          <div class="p-sana">📅 ${dmy(y.sana)} · ${son(y.qolgan_dona)}/${son(y.jami_dona)} dona qolgan
            <button class="li-btn" style="padding:2px 8px;font-size:12px;margin-left:6px" onclick="tgl('ys${y.sana.replace(/-/g,'')}')">📅 sana</button>
            <button class="li-btn" style="padding:2px 8px;font-size:12px;margin-left:4px" onclick="tgl('yt${y.sana.replace(/-/g,'')}')">✏️ hammasi</button></div></div>
        <b class="num" style="margin-left:auto;font-size:15px">${som(y.jami_narx)}</b></div>
        <div id="ys${y.sana.replace(/-/g,'')}" style="display:none;padding:0 0 8px">

          ${y.items.map(p=>`<div class="qrow" style="margin-top:6px">
            <div style="font-weight:600;font-size:14px;margin-bottom:6px">${esc(p.mahsulot)}</div>
            <input class="f tp" data-id="${p.id}" data-f="sana" type="date" value="${p.chiqgan_sana}">
            <div class="inrow" style="margin-top:6px">
              <input class="f tp" data-id="${p.id}" data-f="miqdor" inputmode="decimal" value="${son(p.miqdor)}" placeholder="Soni">
              <input class="f tp" data-id="${p.id}" data-f="kunlik_narx" inputmode="numeric" value="${son(p.kunlik_narx)}" placeholder="Narx/kun"></div>
          </div>`).join('')}
          <button class="send" onclick="toplamSaqla(${d.id})">💾 Hammasini saqlash</button>
          <div id="terr${y.sana.replace(/-/g,'')}"></div></div>
        <div class="litems">${y.items.map(itemHtml).join('')}</div></div>`).join('')

  window.tgl=function(id){const el=document.getElementById(id); if(el) el.style.display=el.style.display==='none'?'block':'none';};
  window.filterPartiya=function(q){
    q=(q||'').toLowerCase().trim();
    document.querySelectorAll('#plist .pcard').forEach(el=>{
      el.style.display=(!q||(el.getAttribute('data-nom')||'').includes(q))?'':'none';});
  };

  window.toplamSaqla=async function(mid){
    const xar={};
    document.querySelectorAll('.tp').forEach(el=>{
      const id=el.getAttribute('data-id'), f=el.getAttribute('data-f');
      if(!xar[id]) xar[id]={id:Number(id)};
      xar[id][f]=(el.value||'').trim();
    });
    const oz=Object.values(xar);
    if(!oz.length){toast('O\'zgarish yo\'q');return;}
    toast('⏳ Saqlanyapti…');
    try{const r=await fetch('/api/partiya_toplam',{method:'POST',headers:{...H,'Content-Type':'application/json'},
        body:JSON.stringify({ozgarishlar:oz})});
      const d=await r.json();
      if(d&&d.ok){
        toast('💾 '+d.soni+' ta saqlandi'+((d.xatolar&&d.xatolar.length)?' · ⚠️ '+d.xatolar.join(' · '):''));
        loadMijoz(mid);
      } else toast((d&&d.xato)||'Xato');
    }catch(e){toast('Xato');}
  };
  window.yetkazmaSana=async function(mid,eski){
    const el=document.getElementById('ysd'+eski.replace(/-/g,''));
    const yangi=el?el.value:'';
    if(!yangi){toast('Sanani tanlang');return;}
    if(yangi===eski){toast('Sana o\'zgarmadi');return;}
    try{const r=await fetch('/api/yetkazma_sana',{method:'POST',headers:{...H,'Content-Type':'application/json'},
        body:JSON.stringify({mijoz_id:mid,eski_sana:eski,yangi_sana:yangi})});
      const d=await r.json();
      if(d&&d.ok){toast('📅 '+d.soni+' ta mahsulot sanasi o\'zgardi');loadMijoz(mid);}
      else toast((d&&d.xato)||'Xato');
    }catch(e){toast('Xato');}
  };
  window.savePartiya=async function(pid,mid){
    const mah=(document.getElementById('e_mah'+pid).value||'').trim();
    const miq=parseFloat((document.getElementById('e_miq'+pid).value||'').replace(/\s/g,''));
    const narx=parseFloat((document.getElementById('e_narx'+pid).value||'').replace(/\s/g,''));
    const sana=document.getElementById('e_sana'+pid).value;
    const manzil=(document.getElementById('e_manzil'+pid).value||'').trim();
    const bkim=((document.getElementById('e_bkim'+pid)||{}).value||'').trim();

    if(!mah||!miq||miq<=0||isNaN(narx)||narx<0||!sana){toast('To\'g\'ri to\'ldiring (tekin bo\'lsa narx 0)');return;}
    try{const r=await fetch('/api/partiya_edit',{method:'POST',headers:{...H,'Content-Type':'application/json'},body:JSON.stringify({partiya_id:pid,mahsulot:mah,miqdor:miq,kunlik_narx:narx,sana,manzil,brov_kim:bkim,brov_miqdor:(bkim?miq:null)})});
      const d=await r.json(); if(d.ok){toast('✏️ O\'zgartirildi');loadMijoz(mid);} else toast(d.xabar||'Xato');}catch(e){toast('Xato');}
  };
  window.saveRet=async function(pid,mid){
    const miq=parseFloat((document.getElementById('r_miq'+pid).value||'').replace(/\s/g,''));
    const sana=document.getElementById('r_sana'+pid).value;
    if(!miq||miq<=0){toast('Nechta qaytdi?');return;}
    try{const r=await fetch('/api/qaytarish',{method:'POST',headers:{...H,'Content-Type':'application/json'},body:JSON.stringify({partiya_id:pid,miqdor:miq,sana})});
      const d=await r.json(); if(d.ok){toast('↩️ Qaytdi');loadMijoz(mid);} else toast(d.xabar||'Xato');}catch(e){toast('Xato');}
  };

      if(!r.ok)throw 0; toast('O\'chirildi'); loadMijoz(mid);}catch(e){toast('Xato');}
  };
  window.delPartiya=async function(pid,mid){
    const ok = tg&&tg.showConfirm ? await new Promise(r=>tg.showConfirm('Bu partiyani butunlay o\'chirasizmi? Hisobdan ham chiqadi.',r)) : confirm('O\'chirasizmi?');
    if(!ok)return;
    try{const r=await fetch('/api/partiya_del',{method:'POST',headers:{...H,'Content-Type':'application/json'},body:JSON.stringify({partiya_id:pid})});
      if(!r.ok)throw 0; toast('🗑 Partiya o\'chirildi'); loadMijoz(mid);}catch(e){toast('Xato');}
  };

  window.saveQosh=async function(tur,mid){
    const v=parseFloat((document.getElementById('qsum').value||'').replace(/\s/g,''));
    if(!v||v<=0){toast('Summani yozing');return;}
    try{const r=await fetch('/api/qoshimcha',{method:'POST',headers:{...H,'Content-Type':'application/json'},body:JSON.stringify({mijoz_id:mid,tur,summa:v,sana:(document.getElementById('qsana')||{}).value})});

    try{const r=await fetch('/api/qoshimcha_del',{method:'POST',headers:{...H,'Content-Type':'application/json'},body:JSON.stringify({id})});

  // ===== TOVAR NOMI: yozayotganda to'g'ri variantni taklif qilish =====
  window._tovarlar=[];
  const tnorm=s=>{s=(s||'').toLowerCase();let o='',d=0;
    for(const c of s){if(c==='(')d++;else if(c===')')d=Math.max(0,d-1);else if(!d)o+=c;}
    return o.replace(/[^a-z0-9а-яё.]/gi,'');};
  function tsim(a,b){ // 0..1 o'xshashlik (Levenshtein asosida)
    if(a===b)return 1; if(!a||!b)return 0;
    const m=a.length,n=b.length,dp=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
    for(let j=0;j<=n;j++)dp[0][j]=j;
    for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
      dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
    return 1-dp[m][n]/Math.max(m,n);
  }
  window.tovarBest=function(v){
    const k=tnorm(v); if(!k||!window._tovarlar.length)return null;
    const exact=window._tovarlar.find(n=>tnorm(n)===k); if(exact)return {name:exact,exact:true,list:[]};
    const sc=[];
    for(const n of window._tovarlar){
      const x=tnorm(n);
      let s=tsim(k,x);
      for(const w of (n||'').toLowerCase().split(/[^a-z0-9\u0400-\u04FF.]+/i)){
        const wn=tnorm(w); if(!wn)continue;
        s=Math.max(s,tsim(k,wn)*0.97);
        if(k.length>=3&&wn.indexOf(k)===0)s=Math.max(s,0.85);
      }
      if(k.length>=3&&x.indexOf(k)>=0)s=Math.max(s,0.9);
      if(s>=0.5)sc.push({name:n,s:s});
    }
    if(!sc.length)return null;
    sc.sort((a,b)=>b.s-a.s);
    const solo=(sc.length===1)||((sc[0].s-sc[1].s)>=0.18);
    return {name:sc[0].name,exact:false,list:solo?[sc[0].name]:sc.slice(0,3).map(x=>x.name)};
  };
  window.tovarHint=function(el){

    if(!v||!window._tovarlar.length){box.textContent='';box.className='thint';return;}
    const b=window.tovarBest(v);
    if(!b){box.className='thint';box.textContent='\u26a0\ufe0f Ombordagi tovar emas';return;}
    if(b.exact){box.className='thint ok';box.textContent='\u2713 '+b.name;return;}
    box.className='thint';
    const chips=b.list.map(n=>'<b onclick="tovarSet(\''+el.id+'\',\''+n.replace(/'/g,"\\'")+'\')">'+esc(n)+'</b>').join(' \u00b7 ');
    box.innerHTML=(b.list.length>1?'Qaysi biri? ':'Shu bo\'lsa kerak: ')+chips;

  window.locAjrat=function(matn){
    const s=String(matn||'').trim();
    if(!s) return null;
    // 1) oddiy koordinata: "41.2856, 69.2034"
    let m=s.match(/(-?\d{1,2}\.\d{3,})\s*[, ]\s*(-?\d{1,3}\.\d{3,})/);
    if(m){
      let a=parseFloat(m[1]), b=parseFloat(m[2]);
      // O'zbekiston: kenglik ~37-46, uzunlik ~55-74 — kerak bo'lsa almashtiramiz
      if(a>50 && b<50){ const t=a; a=b; b=t; }
      return {lat:a, lon:b};
    }
    // 2) Yandex: ll=69.20,41.28 yoki pt=69.20,41.28
    m=s.match(/[?&](?:ll|pt|whatshere\[point\])=(-?\d+\.\d+)[,%2C]+(-?\d+\.\d+)/i);
    if(m){ return {lat:parseFloat(m[2]), lon:parseFloat(m[1])}; }
    // 3) Google: @41.28,69.20 yoki q=41.28,69.20
    m=s.match(/[@=](-?\d+\.\d+),(-?\d+\.\d+)/);
    if(m){ return {lat:parseFloat(m[1]), lon:parseFloat(m[2])}; }
    return null;
  };

    window._vtur=t;
    const a=document.getElementById('vtab1'), b=document.getElementById('vtab2');
    if(a) a.classList.toggle('on', t==='yetkazish');
    if(b) b.classList.toggle('on', t==='olib_kelish');
  };
  window.vazRowAdd=function(){
    const i=++window._vn, box=document.getElementById('vrows'); if(!box)return;
    const div=document.createElement('div');
    div.className='qrow'; div.id='vrow'+i;
    div.innerHTML=`<div class="pickwrap">
        <input class="f" id="vm${i}" placeholder="Mahsulot — bosing yoki yozing" autocomplete="off"
          oninput="vpickShow(${i})" onfocus="vpickShow(${i},1)">
        <button class="pickb" onclick="vpickShow(${i},1,1)">▾</button>
        <div class="picklist" id="vpl${i}"></div></div>
      <div class="inrow" style="margin-top:6px">
        <input class="f" id="vq${i}" inputmode="decimal" placeholder="Soni">
        <button class="unitb" id="vu${i}" onclick="vunitTgl(${i})">ta</button>
        <input class="f" id="vp${i}" inputmode="numeric" placeholder="Narx/kun">
        <button class="delrow" onclick="vazRowDel(${i})">🗑</button></div>`;
    box.appendChild(div);
  };
  window.vazRowDel=function(i){const el=document.getElementById('vrow'+i); if(el) el.remove();};
  window.vpickShow=function(i,hammasi,tugma){
    const inp=document.getElementById('vm'+i), lst=document.getElementById('vpl'+i);
    if(!inp||!lst)return;
    if(tugma && lst.style.display==='block'){lst.style.display='none';return;}
    const q=(inp.value||'').toLowerCase().trim();
    let arr=window._tovarlar||[];
    if(q && !hammasi) arr=arr.filter(n=>n.toLowerCase().includes(q));
    if(!arr.length){lst.style.display='none';return;}
    lst.innerHTML=arr.map(n=>`<div onclick="vpickSet(${i},'${n.replace(/'/g,"\\'")}')">${esc(n)}</div>`).join('');
    lst.style.display='block';
  };
  window.vpickSet=function(i,nom){
    const inp=document.getElementById('vm'+i), lst=document.getElementById('vpl'+i), u=document.getElementById('vu'+i);
    if(inp) inp.value=nom; if(lst) lst.style.display='none';
    const b=(window._tbir||{})[nom]; if(u&&b) u.textContent=b;
    const q=document.getElementById('vq'+i); if(q) q.focus();
  };
  window.vunitTgl=function(i){const u=document.getElementById('vu'+i); if(u) u.textContent=(u.textContent.trim()==='ta')?'kom':'ta';};
  window.vazYarat=async function(mid){
    const rows=[];
    document.querySelectorAll('#vrows .qrow').forEach(el=>{
      const i=el.id.replace('vrow','');
      const m=(document.getElementById('vm'+i).value||'').trim();
      const q=(document.getElementById('vq'+i).value||'').trim();
      const p=(document.getElementById('vp'+i).value||'').trim();
      const u=(document.getElementById('vu'+i).textContent||'ta').trim();
      if(m&&q) rows.push({mahsulot:m,miqdor:q,kunlik_narx:p||0,birlik:u});
    });
    if(!rows.length){toast('Tovar qo\'shing');return;}
    const b={mijoz_id:mid, tur:window._vtur||'yetkazish',
      manzil:(document.getElementById('v_manzil').value||'').trim(),
      lat:(document.getElementById('v_lat').value||'').trim(),
      lon:(document.getElementById('v_lon').value||'').trim(),
      sana:(document.getElementById('v_sana')||{}).value,
      haydovchi_id:(document.getElementById('v_haydovchi').value||'')||null,
      haydovchi:((document.getElementById('v_haydovchi').selectedOptions[0]||{}).textContent||'').trim(),
      izoh:(document.getElementById('v_izoh').value||'').trim(), tovarlar:rows};
    toast('⏳ Yaratilyapti…');
    try{const r=await fetch('/api/vazifa_qosh',{method:'POST',headers:{...H,'Content-Type':'application/json'},body:JSON.stringify(b)});
      const d=await r.json();
      if(d&&d.ok){
        xatoTozala('verr');
        if(b.lat&&b.lon){ try{ fetch('/api/mijoz_loc',{method:'POST',headers:{...H,'Content-Type':'application/json'},
          body:JSON.stringify({mijoz_id:mid,lat:b.lat,lon:b.lon})}); }catch(e){} }
        const link=location.origin+'/v/'+d.token;
        document.getElementById('vlist').innerHTML=
          `<div class="errbox" style="background:rgba(30,122,90,.10);border-color:#9CCFB8;color:#14603F">
            ✅ Vazifa tayyor. Haydovchiga shu havolani yuboring:
            <input class="f" id="vlink" readonly value="${link}" onclick="this.select()" style="margin-top:8px">
            <button class="mini-btn" style="width:100%;margin-top:8px" onclick="vazNusxa()">📋 Nusxa olish</button></div>`;
        toast(d.xabar_yuborildi?'🚚 Vazifa yaratildi — haydovchiga xabar bordi':'🚚 Vazifa yaratildi');
      } else xatoBox('verr',(d&&d.xato)||'Xato');
    }catch(e){ xatoBox('verr','Tarmoq xatosi'); }
  };
  window.vazNusxa=function(){
    const el=document.getElementById('vlink'); if(!el)return;
    el.select(); el.setSelectionRange(0,99999);
    try{ if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(el.value);}
         else{document.execCommand('copy');} toast('📋 Nusxalandi'); }catch(e){ toast('Qo\'lda nusxalang'); }
  };
  window.havolaNusxa=function(){
    const el=document.getElementById('mlink'); if(!el)return;
    el.select(); el.setSelectionRange(0,99999);
    try{
      if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(el.value); }
      else { document.execCommand('copy'); }
      toast('📋 Havola nusxalandi');
    }catch(e){ toast('Havolani qo\'lda nusxalang'); }
  };
  window.chiqish=function(){ tokenSet(''); loginEkran(); };
  window.APPV='100';   // yuklangan versiya (nosozlikni aniqlash uchun)

  // Telegram ichida bo'lsa — to'g'ridan-to'g'ri, aks holda token / login
  if ((tg && tg.initData) || tokenGet()) { loadList(); } else { loginEkran(); }
  if('serviceWorker' in navigator){ try{ navigator.serviceWorker.register('/sw.js'); }catch(e){} }
</script>
</body>
</html>
