<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ijara hisobi</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;450;500;600&display=swap');
  :root{--bg:#F3F5F4;--card:#FFFFFF;--ink:#1B2A26;--soft:#63736D;--line:#E7EBE9;
    --brand:#1F4B45;--brand2:#2C6A60;--pos:#2E7D5B;--neg:#C0674F;--faint:#EEF2F0;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;max-width:520px;margin:0 auto;
    padding:0 14px 40px;line-height:1.4;-webkit-font-smoothing:antialiased;}
  .num{font-family:'Space Grotesk',sans-serif;font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
  header{padding:20px 4px 12px;display:flex;align-items:flex-end;}
  .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--brand2);font-weight:600;}
  h1{font-family:'Space Grotesk';font-size:22px;font-weight:700;margin-top:3px;}
  .plus{margin-left:auto;background:var(--brand);color:#fff;border:none;border-radius:11px;padding:9px 13px;
    font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;}
  .hero{background:var(--brand);color:#fff;border-radius:18px;padding:18px 20px;margin-bottom:16px;position:relative;overflow:hidden;}
  .hero .arc{position:absolute;right:-40px;top:-40px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.05);}
  .hero .lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.55);font-weight:600;}
  .hero .amt{font-size:30px;font-weight:700;margin-top:6px;} .hero .amt small{font-size:15px;color:rgba(255,255,255,.65);}
  .hero .sub{font-size:12.5px;color:rgba(255,255,255,.6);margin-top:4px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:15px;margin-bottom:10px;}
  .mijoz{display:flex;align-items:center;gap:13px;cursor:pointer;}
  .av{width:44px;height:44px;border-radius:12px;background:var(--faint);color:var(--brand);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-weight:700;font-size:17px;}
  .mijoz .nm{font-size:15.5px;font-weight:600;} .mijoz .mt{font-size:12.5px;color:var(--soft);margin-top:2px;}
  .mijoz .val{margin-left:auto;text-align:right;flex-shrink:0;white-space:nowrap;padding-left:10px;} .mijoz .val b{font-family:'Space Grotesk';font-weight:700;font-size:15.5px;white-space:nowrap;}
  .mijoz .val span{display:block;font-size:11px;color:var(--soft);} .chev{color:#B7C3BD;font-size:20px;margin-left:6px;}
  .back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--brand2);
    font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;padding:6px 0;margin-bottom:4px;}
  .p-head{display:flex;align-items:center;margin-bottom:10px;}
  .p-badge{background:var(--brand);color:#fff;font-family:'Space Grotesk';font-weight:700;font-size:13px;
    width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-right:10px;flex-shrink:0;}
  .p-title{font-size:15px;font-weight:600;} .p-sana{font-size:12px;color:var(--soft);}
  .p-grid{display:flex;gap:8px;margin-top:10px;}
  .box{flex:1;background:var(--faint);border-radius:10px;padding:9px 10px;}
  .box .k{font-size:10.5px;color:var(--soft);text-transform:uppercase;} .box .v{font-family:'Space Grotesk';font-weight:600;font-size:15px;margin-top:2px;}
  .p-narx{display:flex;justify-content:space-between;align-items:center;margin-top:11px;padding-top:11px;border-top:1px solid var(--faint);}
  .p-narx .k{font-size:13px;color:var(--soft);} .p-narx b{font-family:'Space Grotesk';font-weight:700;font-size:16px;}
  .done{color:var(--pos);font-weight:600;font-size:12.5px;}
  .addbox{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px;margin-bottom:10px;}
  .addbox .t{font-family:'Space Grotesk';font-weight:600;font-size:14px;margin-bottom:10px;}
  .inrow{display:flex;gap:8px;}
  input.f{flex:1;width:100%;padding:12px;border:1px solid var(--line);border-radius:11px;font-size:15px;font-family:inherit;color:var(--ink);outline:none;background:#fff;}
  input.f:focus{border-color:var(--brand);}
  .mic{width:46px;flex-shrink:0;border:1px solid var(--line);background:#fff;border-radius:11px;font-size:19px;cursor:pointer;}
  .mic.rec{background:var(--neg);border-color:var(--neg);color:#fff;animation:pulse 1s infinite;}
  @keyframes pulse{50%{opacity:.55;}}
  .send{width:100%;margin-top:8px;padding:12px;background:var(--brand);color:#fff;border:none;border-radius:11px;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;}
  .del{width:100%;margin-top:8px;padding:13px;border:1px solid var(--neg);color:var(--neg);background:#fff;border-radius:12px;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;}
  .hint{font-size:12px;color:var(--soft);margin-top:8px;}
  .center{min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--soft);font-size:14px;padding:20px;}
  .spin{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--brand);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 12px;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .empty{text-align:center;color:var(--soft);font-size:14px;padding:40px 20px;}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:11px 16px;border-radius:12px;font-size:13.5px;max-width:90%;text-align:center;z-index:50;box-shadow:0 6px 20px rgba(0,0,0,.2);}
  .form input{margin-top:8px;}
  .search{margin-bottom:12px;}
  .search input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;font-size:15px;font-family:inherit;background:#fff;outline:none;}
  .search input:focus{border-color:var(--brand);}
  .brk{display:flex;justify-content:space-between;font-size:14px;padding:8px 0;}
  .brk:not(:last-child){border-bottom:1px solid var(--faint);}
  .brk .k{color:var(--soft);} .brk b{font-family:'Space Grotesk';}
  .tlist{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--faint);font-size:13.5px;}
  .tlist:last-child{border-bottom:none;}
  .tlist .s{font-family:'Space Grotesk';font-weight:600;color:var(--pos);}
  .tlist .x{margin-left:auto;color:#B7C3BD;background:none;border:none;font-size:18px;cursor:pointer;}
  .mini-btn{flex:1;padding:9px;border:1px solid var(--line);background:#fff;border-radius:10px;font-family:inherit;font-weight:600;font-size:13px;color:var(--brand);cursor:pointer;}
  .rlist{display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px solid var(--faint);font-size:13px;color:var(--soft);}
  .rlist .x{margin-left:auto;color:#B7C3BD;background:none;border:none;font-size:17px;cursor:pointer;}
  .statrow{display:flex;align-items:center;gap:10px;padding:12px 15px;}
  .stbadge{font-weight:600;font-size:13.5px;padding:5px 12px;border-radius:20px;}
  .edit-status{margin-left:auto;background:none;border:1px solid var(--line);border-radius:9px;padding:7px 11px;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--soft);cursor:pointer;}
  .stdot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px;vertical-align:middle;}
  .litems{margin-top:2px;}
  .litem{padding:11px 0;border-top:1px solid var(--faint);}
  .litem:first-child{border-top:none;padding-top:4px;}
  .li-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
  .li-nm{font-size:14.5px;font-weight:600;}
  .li-val{font-family:'Space Grotesk';font-size:12.5px;color:var(--soft);white-space:nowrap;}
  .li-sub{display:flex;justify-content:space-between;align-items:center;margin-top:4px;font-size:12px;color:var(--soft);}
  .li-acts{display:flex;gap:6px;}
  .li-manzil{font-size:12px;color:var(--brand);margin-top:3px;}
  .li-brov{font-size:12px;color:#B26A31;margin-top:3px;}
  .ta{flex:1 1 auto;width:100%;min-width:0;box-sizing:border-box;resize:none;overflow:hidden;height:46px;min-height:46px;line-height:1.45;font-family:inherit;padding:12px 14px;}
  .mic-sm{height:46px;}
  .thint{font-size:12px;color:var(--brand2);margin:0 0 8px 2px;min-height:15px;}
  .thint b{cursor:pointer;text-decoration:underline;}
  .thint.ok{color:var(--pos);}
  .mzg{padding:9px 0;border-top:1px solid var(--faint);}
  .mzg:first-child{border-top:none;padding-top:2px;}
  .mzg-h{font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:5px;}
  .mzg-i{display:flex;align-items:center;justify-content:space-between;font-size:13px;padding:2px 0;color:var(--soft);}
  .mzg-i b{font-family:'Space Grotesk';color:var(--ink);}
  .li-btn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 11px;font-size:13px;cursor:pointer;color:var(--brand);font-family:inherit;}
  .retg{padding:9px 0;border-top:1px solid var(--faint);}
  .retg:first-child{border-top:none;padding-top:2px;}
  .retg-d{font-size:12px;color:var(--brand2);font-weight:600;margin-bottom:5px;}
  .retg-i{display:flex;align-items:center;justify-content:space-between;font-size:13.5px;padding:3px 0;}
  .retg-i b{font-family:'Space Grotesk';}
  .retg-i .x{color:#B7C3BD;background:none;border:none;font-size:17px;cursor:pointer;}
  .smsbtn{width:100%;padding:12px;background:#fff;border:1px solid var(--brand);color:var(--brand);border-radius:12px;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;margin-bottom:10px;}
  .omb-wrap{background:#0B1017;margin:0 -14px;padding:14px;min-height:100vh;}
  .omb-h{padding:4px 2px 12px;}
  .omb-h .t{font-family:'Space Grotesk';font-size:21px;font-weight:700;color:#fff;}
  .omb-h .s{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#5B6B7A;margin-top:2px;}
  .omb-stats{display:flex;gap:8px;margin-bottom:12px;}
  .omb-stat{flex:1;background:#131C26;border-radius:12px;padding:12px;}
  .omb-stat .v{font-family:'Space Grotesk';font-weight:700;font-size:19px;color:#fff;}
  .omb-stat .k{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#5B6B7A;margin-top:3px;}
  .omb-search input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #1E2A36;background:#131C26;color:#fff;font-size:15px;font-family:inherit;outline:none;margin-bottom:12px;}
  .omb-card{background:#131C26;border-radius:14px;margin-bottom:10px;overflow:hidden;}
  .omb-top{display:flex;align-items:center;padding:12px 14px;}
  .omb-nm{color:#fff;font-weight:600;font-size:15px;}
  .omb-jami{margin-left:auto;color:#5B6B7A;font-size:12.5px;font-family:'Space Grotesk';}
  .omb-edit{background:none;border:none;color:#5B6B7A;font-size:15px;margin-left:12px;cursor:pointer;}
  .omb-grid{display:flex;border-top:1px solid #1E2A36;}
  .omb-col{flex:1;text-align:center;padding:12px;}
  .omb-col:first-child{border-right:1px solid #1E2A36;}
  .omb-col .v{font-family:'Space Grotesk';font-weight:700;font-size:24px;}
  .omb-col .k{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#5B6B7A;margin-top:3px;}
  .omb-a{color:#E8B44A;} .omb-o{color:#3FBF87;} .omb-z{color:#E0574A;}
  .omb-acts{padding:11px 14px;border-top:1px solid #1E2A36;}
  .omb-btn{width:100%;padding:11px;border-radius:10px;border:1px solid #2A3B4A;background:#1A2632;color:#CFE3EE;font-family:inherit;font-weight:600;font-size:13.5px;cursor:pointer;margin-bottom:7px;}
  .omb-in{width:100%;padding:11px;border-radius:10px;border:1px solid #2A3B4A;background:#0E151D;color:#fff;font-size:15px;font-family:inherit;outline:none;margin-bottom:7px;}
  .omb-tabs{display:flex;gap:8px;margin-bottom:12px;}
  .omb-tab{flex:1;padding:11px;border-radius:11px;border:none;background:#131C26;color:#8A9AA8;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;}
  .omb-tab.on{background:#F3F5F4;color:#0B1017;}
  .ombnav{margin-left:auto;background:#12202B;color:#fff;border:none;border-radius:11px;padding:9px 13px;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;}
</style>
</head>
<body>
  <div id="app"><div class="center"><div><div class="spin"></div>Yuklanmoqda…</div></div></div>
  <div id="toast"></div>
  <datalist id="tovarlist"></datalist>
<script>
  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg){ try{ tg.ready(); tg.expand(); tg.setHeaderColor('#1F4B45'); tg.setBackgroundColor('#F3F5F4'); }catch(e){} }
  const H = { 'X-Init-Data': (tg && tg.initData) || '' };
  const app = document.getElementById('app');
  let rec=null, recChunks=[], recMid=null;

  const som=n=>{n=Math.round(Number(n)||0);return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ');};
  const son=n=>{n=Number(n)||0;return Number.isInteger(n)?n:parseFloat(n.toFixed(2)).toString();};
  const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const ini=s=>(s||'?').trim().charAt(0).toUpperCase();
  const dmy=s=>{if(!s)return'';const p=(''+s).slice(0,10).split('-');return p.length===3?p[2]+'.'+p[1]+'.'+p[0].slice(2):s;};
  const STAT={faol:{t:'Faol',c:'#2E7D5B',bg:'rgba(46,125,91,.13)'},nofaol:{t:'Nofaol',c:'#C0674F',bg:'rgba(192,103,79,.13)'},sotuv:{t:'Sotuv',c:'#2D6CB2',bg:'rgba(45,108,178,.13)'}};
  const phones=s=>(s||'').split(',').map(x=>x.trim()).filter(Boolean).join(' · ');
  function toast(m){const t=document.getElementById('toast');t.innerHTML='<div class="toast">'+esc(m)+'</div>';setTimeout(()=>t.innerHTML='',3500);}
  function errScreen(){app.innerHTML='<div class="center"><div>Ma\'lumot yuklanmadi.<br><br>Botdagi <b>«📊 Hisob»</b> tugmasi orqali oching.</div></div>';}

  async function loadList(){
    app.innerHTML='<div class="center"><div><div class="spin"></div>Yuklanmoqda…</div></div>';
    let d; try{const r=await fetch('/api/mijozlar',{headers:H});if(!r.ok)throw 0;d=await r.json();}catch(e){return errScreen();}
    window._ml=d.mijozlar||[]; const jami=_ml.reduce((s,m)=>s+m.qolgan_qarz,0);
    app.innerHTML=`<header><div><div class="eyebrow">Ijara hisobi</div><h1>Mijozlar</h1></div>
        <button class="ombnav" onclick="loadOmbor()">📦 Ombor</button>
        <button class="plus" style="margin-left:8px" onclick="showNew()">➕</button></header>
      <div class="hero"><div class="arc"></div><div class="lbl">Umumiy qarz</div>
        <div class="amt num">${som(jami)} <small>so'm</small></div><div class="sub">${_ml.length} ta mijoz</div></div>
      <div id="newform"></div>
      <div class="search"><input id="qidir" placeholder="🔍 Ism yoki telefon..." oninput="renderCards(this.value)"></div>
      <div id="cards"></div>`;
    renderCards('');
  }

  window.renderCards=function(q){
    q=(q||'').toLowerCase().trim();
    const list=(window._ml||[]).filter(m=>!q || (m.mijoz||'').toLowerCase().includes(q) || (m.telefon||'').includes(q));
    let cards=list.map(m=>`<div class="card"><div class="mijoz" onclick="loadMijoz(${m.id})">
        <div class="av">${ini(m.mijoz)}</div>
        <div><div class="nm">${m.status&&STAT[m.status]?`<span class="stdot" style="background:${STAT[m.status].c}"></span>`:''}${esc(m.mijoz)}</div>
          <div class="mt">${m.telefon?('📞 '+esc(phones(m.telefon))+' · '):''}${son(m.jami_qolgan)} dona qolgan</div></div>
        <div class="val"><b>${som(m.qolgan_qarz)}</b><span>so'm</span></div><div class="chev">›</div></div></div>`).join('');
    if(!list.length) cards='<div class="empty">'+(q?'Topilmadi':'Hozircha mijoz yo\'q. «➕ Yangi» bosing.')+'</div>';
    document.getElementById('cards').innerHTML=cards;
  };

  window.showNew=function(){
    const f=document.getElementById('newform');
    if(f.innerHTML){f.innerHTML='';return;}
    f.innerHTML=`<div class="addbox form"><div class="t">➕ Yangi mijoz</div>
      <input class="f" id="n_ism" placeholder="Ism (masalan Abbos)">
      <input class="f" id="n_tel" placeholder="Telefon (bir nechta bo'lsa probel yoki vergul bilan)" inputmode="tel">
      <button class="send" onclick="saveNew()">Saqlash</button></div>`;
  };
  window.saveNew=async function(){
    const ism=document.getElementById('n_ism').value.trim();
    const tel=document.getElementById('n_tel').value.trim();
    if(!ism){toast('Ism kiriting');return;}
    try{const r=await fetch('/api/mijoz_qosh',{method:'POST',headers:{...H,'Content-Type':'application/json'},body:JSON.stringify({ism,telefon:tel})});
      const d=await r.json(); if(d.ok){toast('Mijoz qo\'shildi');loadMijoz(d.id);} else toast(d.xato||'Xato');}catch(e){toast('Xato');}
  };

  window.loadMijoz=async function(id){
    app.innerHTML='<div class="center"><div><div class="spin"></div>Yuklanmoqda…</div></div>';
    let d; try{const r=await fetch('/api/mijoz?id='+id,{headers:H});if(!r.ok)throw 0;d=await r.json();}catch(e){return errScreen();}
    const bugun=new Date().toLocaleDateString('en-CA');
    window._curMijoz=d;
    // Bitta mahsulot satri (yetkazma ichida)
    const itemHtml=p=>{const done=p.qolgan<=0;
      return `<div class="litem pcard" data-nom="${esc((p.mahsulot||'').toLowerCase())}">
        <div class="li-top"><span class="li-nm">${esc(p.mahsulot)}${done?' <span class="done">✓</span>':''}</span>
          <span class="li-val">${son(p.qolgan)}/${son(p.miqdor)} · ${som(p.kunlik_narx)}/kun</span></div>
        ${p.manzil?`<div class="li-manzil">📍 ${esc(p.manzil)}</div>`:''}
        <div class="li-sub"><span>🧮 ${som(p.narx)} so'm · ${p.kunlar} kun</span>
          <span class="li-acts"><button class="li-btn" onclick="tgl('edit${p.id}')">✏️</button>
            ${p.qolgan>0?`<button class="li-btn" onclick="tgl('ret${p.id}')">↩️</button>`:''}</span></div>
        <div id="edit${p.id}" style="display:none;margin-top:8px">
          <input class="f" id="e_mah${p.id}" value="${esc(p.mahsulot)}" placeholder="Mahsulot" list="tovarlist" oninput="tovarHint(this)" onblur="tovarFix(this)" autocomplete="off" style="margin-bottom:4px">
          <div class="thint" id="th${p.id}"></div>
          <div class="inrow"><input class="f" id="e_miq${p.id}" value="${son(p.miqdor)}" inputmode="decimal" placeholder="Soni">
            <input class="f" id="e_narx${p.id}" value="${son(p.kunlik_narx)}" inputmode="numeric" placeholder="Kunlik narx"></div>
          <input class="f" id="e_manzil${p.id}" value="${esc(p.manzil||'')}" placeholder="📍 Manzil / ob'ekt" style="margin-top:8px">
          <input class="f" id="e_sana${p.id}" type="date" value="${p.chiqgan_sana}" style="margin-top:8px">
          <button class="send" onclick="savePartiya(${p.id},${d.id})">Saqlash</button>
          <button class="del" style="margin-top:8px" onclick="delPartiya(${p.id},${d.id})">🗑 Bu mahsulotni o'chirish</button></div>
        <div id="ret${p.id}" style="display:none;margin-top:8px">
          <div class="inrow"><input class="f" id="r_miq${p.id}" inputmode="decimal" placeholder="Nechta qaytdi">
            <input class="f" id="r_sana${p.id}" type="date" value="${bugun}"></div>
          <button class="send" onclick="saveRet(${p.id},${d.id})">Qaytdi</button></div>
      </div>`;};
    // Yetkazmalar (nakladnoy): bir kun = bir karta
    const ps=(d.yetkazmalar||[]).map(y=>`<div class="card"><div class="p-head"><div class="p-badge">📦</div>
        <div><div class="p-title">Yetkazma · ${y.items.length} mahsulot</div>
          <div class="p-sana">📅 ${dmy(y.sana)} · ${son(y.qolgan_dona)}/${son(y.jami_dona)} dona qolgan</div></div>
        <b class="num" style="margin-left:auto;font-size:15px">${som(y.jami_narx)}</b></div>
        <div class="litems">${y.items.map(itemHtml).join('')}</div></div>`).join('')

  window.savePartiya=async function(pid,mid){
    const mah=(document.getElementById('e_mah'+pid).value||'').trim();

    try{const r=await fetch('/api/partiya_edit',{method:'POST',headers:{...H,'Content-Type':'application/json'},body:JSON.stringify({partiya_id:pid,mahsulot:mah,miqdor:miq,kunlik_narx:narx,sana,manzil})});
      const d=await r.json(); if(d.ok){toast('✏️ O\'zgartirildi');loadMijoz(mid);} else toast(d.xabar||'Xato');}catch(e){toast('Xato');}

  window.recToggle=async function(mid){
    const btn=document.getElementById('micbtn');
    if(rec && rec.state==='recording'){rec.stop();return;}
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      let opts={};
      if(window.MediaRecorder && MediaRecorder.isTypeSupported){
        if(MediaRecorder.isTypeSupported('audio/ogg;codecs=opus')) opts={mimeType:'audio/ogg;codecs=opus'};
        else if(MediaRecorder.isTypeSupported('audio/ogg')) opts={mimeType:'audio/ogg'};
      }
      rec=new MediaRecorder(stream,opts); recChunks=[]; recMid=mid;
      rec.ondataavailable=e=>recChunks.push(e.data);
      rec.onstop=async()=>{const blob=new Blob(recChunks,{type:rec.mimeType||'audio/webm'});
        stream.getTracks().forEach(t=>t.stop()); btn.classList.remove('rec'); btn.textContent='🎤';
        toast('Yuborilyapti…');
        try{const r=await fetch('/api/qoshish_audio',{method:'POST',headers:{...H,'X-Mijoz-Id':String(recMid),'Content-Type':blob.type||'audio/webm'},body:blob});
          let d=null; try{d=await r.json();}catch(_){}
          if(!r.ok || !d){ toast('Ovoz xato: '+r.status); return; }
          toast(d.xabar||'Bajarildi'); if(d.ok) loadMijoz(recMid);
        }catch(e){ toast('Ovoz yuborilmadi (tarmoq)'); }
      };
      rec.start(); btn.classList.add('rec'); btn.textContent='⏹'; toast('Yozilyapti… tugatish uchun ⏹ bosing');
    }catch(e){toast('Mikrofon ochilmadi. Yozib qo\'shing.');}
  };

  async function ombPost(url,body){const r=await fetch(url,{method:'POST',headers:{...H,'Content-Type':'application/json'},body:JSON.stringify(body)});let j=null;try{j=await r.json();}catch(_){}return j;}
  async function reloadOmbor(){try{const r=await fetch('/api/ombor',{headers:H});const d=await r.json();window._omb=d.mahsulotlar||[];}catch(e){}renderOmborView();}
  window.omborMove=async function(id,tur){const v=parseFloat((document.getElementById('ot'+id).value||'').replace(/\s/g,''));

  window.omborTotal=async function(id){const v=parseFloat((document.getElementById('os'+id).value||'').replace(/\s/g,''));

  window.omborRename=async function(id){const v=(document.getElementById('on'+id).value||'').trim();

  window.omborAdd=async function(){const nom=(document.getElementById('onew_nom').value||'').trim();

  window.omborDel=async function(id){const ok=tg&&tg.showConfirm?await new Promise(r=>tg.showConfirm('Bu tovarni o\'chirasizmi?',r)):confirm('O\'chirasizmi?');

  window.loadOmborTarix=async function(){

    const TUR={out:'📤 Chiqdi',ret:'📥 Qaytdi',add:'➕ Keldi',writeoff:'🔧 Sindi',ij_out:'📤 Ijara chiqdi',ij_ret:'📥 Ijara qaytdi'};

  // ===== TOVAR NOMI: yozayotganda to'g'ri variantni taklif qilish =====
  window._tovarlar=[];
  const tnorm=s=>{s=(s||'').toLowerCase();let o='',d=0;
    for(const c of s){if(c==='(')d++;else if(c===')')d=Math.max(0,d-1);else if(!d)o+=c;}
    return o.replace(/[^a-z0-9а-яё.]/gi,'');};
  function tsim(a,b){ // 0..1 o'xshashlik (Levenshtein asosida)
    if(a===b)return 1; if(!a||!b)return 0;
    const m=a.length,n=b.length,dp=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
    for(let j=0;j<=n;j++)dp[0][j]=j;
    for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
      dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
    return 1-dp[m][n]/Math.max(m,n);
  }
  window.tovarBest=function(v){
    const k=tnorm(v); if(!k||!window._tovarlar.length)return null;
    const exact=window._tovarlar.find(n=>tnorm(n)===k); if(exact)return {name:exact,exact:true,list:[]};
    const sc=[];
    for(const n of window._tovarlar){
      const x=tnorm(n);
      let s=tsim(k,x);
      for(const w of (n||'').toLowerCase().split(/[^a-z0-9\u0400-\u04FF.]+/i)){
        const wn=tnorm(w); if(!wn)continue;
        s=Math.max(s,tsim(k,wn)*0.97);
        if(k.length>=3&&wn.indexOf(k)===0)s=Math.max(s,0.85);
      }
      if(k.length>=3&&x.indexOf(k)>=0)s=Math.max(s,0.9);
      if(s>=0.5)sc.push({name:n,s:s});
    }
    if(!sc.length)return null;
    sc.sort((a,b)=>b.s-a.s);
    const solo=(sc.length===1)||((sc[0].s-sc[1].s)>=0.18);
    return {name:sc[0].name,exact:false,list:solo?[sc[0].name]:sc.slice(0,3).map(x=>x.name)};
  };
  window.tovarHint=function(el){
    const box=document.getElementById('th'+el.id.replace('e_mah',''));
    if(!box)return; const v=(el.value||'').trim();
    if(!v||!window._tovarlar.length){box.textContent='';box.className='thint';return;}
    const b=window.tovarBest(v);
    if(!b){box.className='thint';box.textContent='\u26a0\ufe0f Ombordagi tovar emas';return;}
    if(b.exact){box.className='thint ok';box.textContent='\u2713 '+b.name;return;}
    box.className='thint';
    const chips=b.list.map(n=>'<b onclick="tovarSet(\''+el.id+'\',\''+n.replace(/'/g,"\\'")+'\')">'+esc(n)+'</b>').join(' \u00b7 ');
    box.innerHTML=(b.list.length>1?'Qaysi biri? ':'Shu bo\'lsa kerak: ')+chips;
  };
  window.tovarSet=function(inputId,name){
    const el=document.getElementById(inputId); if(!el)return;
    el.value=name; window.tovarHint(el);
  };
  window.tovarFix=function(el){ // maydondan chiqqanda faqat aniq bo'lsa to'g'rilaydi
    const v=(el.value||'').trim(); if(!v)return;
    const b=window.tovarBest(v);
    if(b&&!b.exact&&b.list.length===1){el.value=b.name;window.tovarHint(el);}
  };
  async function loadTovarlar(){
    try{const r=await fetch('/api/ombor',{headers:H});const d=await r.json();

    app.innerHTML=`<header><div><div class="eyebrow">Boshqadan olib turilgan</div><h1>Brovdan</h1></div>

      <div class="addbox"><div class="t">➕ Brovdan oldim</div>
        <input class="f" id="bv_kim" placeholder="Kimdan (masalan: Aliboy)" style="margin-bottom:8px">
        <input class="f" id="bv_mah" placeholder="Mahsulot" list="tovarlist" autocomplete="off" style="margin-bottom:8px">
        <div class="inrow"><input class="f" id="bv_miq" inputmode="decimal" placeholder="Nechta">
          <input class="f" id="bv_sana" type="date" value="${bugun}"></div>
        <input class="f" id="bv_izoh" placeholder="Izoh (ixtiyoriy)" style="margin-top:8px">
        <button class="send" onclick="brovAdd()">Qo'shish</button></div>
      ${cards}`;

  async function brovPost(u,b){const r=await fetch(u,{method:'POST',headers:{...H,'Content-Type':'application/json'},body:JSON.stringify(b)});let j=null;try{j=await r.json();}catch(_){}return j;}
